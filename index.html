<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAMDANI HASAN | Aparatur Desa</title>

<meta name="description" content="Website Resmi Aparatur Desa Bonto Marannu">

<meta property="og:title" content="HAMDANI HASAN | Aparatur Desa">
<meta property="og:description" content="Kepala Seksi Pemerintahan Desa Bonto Marannu">
<meta property="og:image" content="https://i.imgur.com/4Z7Dz6o.png">
<meta property="og:type" content="website">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(-45deg,#000,#111,#3d2f00,#c9a227,#111,#000);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:#fff;
}

@keyframes bg{
0%{background-position:0 50%}
50%{background-position:100% 50%}
100%{background-position:0 50%}
}

.wrap{
max-width:480px;
margin:auto;
padding:20px;
}

.card{
margin:30px 0;
background:rgba(20,20,20,.7);
border:1px solid rgba(255,215,0,.35);
border-radius:24px;
padding:25px;
text-align:center;
backdrop-filter:blur(12px);
}

#profile{
width:220px;
height:220px;
border-radius:12px;
border:5px solid gold;
object-fit:cover;
margin-bottom:15px;
}

h1{
color:gold;
margin-bottom:5px;
}

h3{
color:#fff5b5;
margin-bottom:20px;
}

.marq{
overflow:hidden;
white-space:nowrap;
margin:20px 0;
}

.marq span{
display:inline-block;
padding-left:100%;
animation:jalan 16s linear infinite;
}

@keyframes jalan{
to{
transform:translateX(-100%);
}
}

.btn{
display:block;
margin:12px 0;
padding:15px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.wa{
background:#25D366;
color:#fff;
}

.web{
background:gold;
color:#111;
}

.footer{
text-align:center;
margin:25px 0;
color:#ddd;
}

#admin{
display:none;
text-align:center;
margin-top:25px;
}

label{
background:gold;
color:#111;
padding:12px 18px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
display:inline-block;
}

input{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<img id="profile" src="https://i.imgur.com/4Z7Dz6o.png">

<div>APARATUR DESA</div>

<h1>HAMDANI HASAN</h1>

<h3>Kepala Seksi Pemerintahan</h3>

<div class="marq">
<span>
Berdedikasi melayani masyarakat Desa Bonto Marannu dengan integritas, profesionalisme, dan semangat kebersamaan.
</span>
</div>

<h2 style="color:gold;margin-bottom:15px;">Layanan Desa Digital</h2>

<a class="btn wa"
href="https://wa.me/628521120567?text=Assalamu%20Alaikum%20Pak%20Hamdani%20Hasan">
📱 WhatsApp
</a>

<a class="btn web"
href="https://bontomarannu.com">
🌐 bontomarannu.com
</a>

</div>

<div class="footer">
<b>Desa Bonto Marannu 2026</b><br>
Melayani Setulus Hati
</div>

<div id="admin">
<label>
📷 Ganti Foto
<input type="file" id="up" accept="image/*">
</label>
</div>

</div>

<script>

const isAdmin=true; // ubah menjadi false jika bukan admin

if(isAdmin){
document.getElementById("admin").style.display="block";
}

up.onchange=function(e){

let file=e.target.files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(x){

document.getElementById("profile").src=x.target.result;

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
