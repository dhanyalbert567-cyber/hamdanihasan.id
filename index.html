<!DOCTYPE html>
<html lang="id">
<head>

<title>Hamdani Hasan</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
}

/* Banner */
.banner{
    width:100%;
    overflow:hidden;
    background:#fff;
}

.banner img{
    width:100%;
    height:auto;
    display:block;
}

/* Header */
header{
    background:#1b1b1b;
    text-align:center;
    padding:50px 20px;
}

.label{
    color:#d4af37;
    font-size:16px;
    font-weight:bold;
    letter-spacing:3px;
    margin-bottom:10px;
    text-transform:uppercase;
}

h1{
    font-size:42px;
    margin-bottom:8px;
}

h3{
    font-size:22px;
    color:#ddd;
    margin-bottom:20px;
    font-weight:normal;
}

p{
    max-width:700px;
    margin:0 auto 30px;
    line-height:1.8;
    color:#ccc;
}

/* Tombol */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin:8px;
    padding:14px 26px;
    background:#d4af37;
    color:#111;
    text-decoration:none;
    border-radius:40px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#f3c94c;
    transform:translateY(-2px);
}

.btn i{
    font-size:20px;
}

/* Responsive */
@media(max-width:768px){

h1{
    font-size:30px;
}

h3{
    font-size:18px;
}

p{
    font-size:15px;
}

.btn{
    display:flex;
    justify-content:center;
    width:90%;
    margin:10px auto;
}
}
</style>

</head>
<body>

<!-- Banner Utama -->
<div class="banner">
    <img src="1001043606.png" alt="Website Resmi Pemerintah Desa Bonto Marannu">
</div>

<header>

<h1>Hamdani Hasan</h1>

<h3>Kepala Seksi Pemerintahan</h3>

<p>

</p>

href="https://wa.me/6285211120567?text=Assalamu'alaikum%20Pak%20Hamdani"
target="_blank">
<i class="fa-brands fa-whatsapp"></i>

<a class="btn"
href="https://bontomarannu.com"
