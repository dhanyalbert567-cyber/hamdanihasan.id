<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HAMDANI HASAN | Aparatur Desa</title>

<meta property="og:image" content="https://i.imgur.com/4Z7Dz6o.png">

<style>
body{
    font-family:Arial;
    background:linear-gradient(45deg,#000,#c9a227);
    color:#fff;
    margin:0;
}

.wrap{
    max-width:480px;
    margin:auto;
    padding:20px;
}

.card{
    background:#222;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

#profile{
    width:100%;
    height:230px;
    object-fit:cover;
    border:4px solid gold;
    border-radius:18px;
}

.btn{
    display:block;
    margin:12px 0;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
}

.wa{
    background:#25D366;
    color:#fff;
}

.web{
    background:gold;
    color:#111;
}

/* Tombol Musik */
.music-btn{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
    background:rgba(255,215,0,.95);
    color:#111;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(255,215,0,.7);
    z-index:999;
    transition:.3s;
}

.music-btn:hover{
    transform:translateX(-50%) scale(1.08);
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<img id="profile" src="https://i.imgur.com/4Z7Dz6o.png">

<h1>HAMDANI HASAN</h1>
<h3>Kepala Seksi Pemerintahan</h3>

<p>Berdedikasi melayani masyarakat Desa Bonto Marannu.</p>

<a class="btn wa" href="https://wa.me/628521120567?text=Assalamu%20Alaikum%20Pak%20Hamdani">
📱 WhatsApp
</a>

<a class="btn web" href="https://bontomarannu.com">
🌐 bontomarannu.com
</a>

<audio id="musik" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

</div>
</div>

<!-- Tombol Musik Lingkaran -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<script>
const musik=document.getElementById("musik");
const btn=document.getElementById("musicBtn");

function toggleMusic(){
    if(musik.paused){
        musik.play();
        btn.innerHTML="⏸";
    }else{
        musik.pause();
        btn.innerHTML="🎵";
    }
}
</script>

</body>
</html>
