<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAMDANI HASAN | Aparatur Desa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(-45deg,#000,#111,#3d2f00,#c9a227,#111,#000);background-size:400% 400%;animation:bg 12s ease infinite;color:#fff}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.wrap{max-width:480px;margin:auto;padding:20px}
.card{margin:30px 0;background:rgba(20,20,20,.7);border:1px solid rgba(255,215,0,.3);border-radius:24px;padding:24px;text-align:center;backdrop-filter:blur(10px)}
img{width:180px;height:180px;border-radius:50%;border:5px solid gold;object-fit:cover}
h1{color:gold;margin:15px 0 5px}
h3{color:#fff3b0}
.marq{overflow:hidden;white-space:nowrap;margin:20px 0}
.marq span{display:inline-block;padding-left:100%;animation:m 16s linear infinite}
@keyframes m{to{transform:translateX(-100%)}}
.btn{display:block;margin:12px 0;padding:14px;border-radius:14px;text-decoration:none;font-weight:bold}
.wa{background:#25D366;color:#fff}
.web{background:gold;color:#111}
.footer{text-align:center;margin:30px 0;color:#ddd}
label{display:inline-block;margin:15px;background:gold;color:#111;padding:10px 16px;border-radius:20px;cursor:pointer}
input{display:none}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<img id="profile" src="https://i.imgur.com/4Z7Dz6o.png">
<br>
<label>📷 Ganti Foto<input type="file" id="up" accept="image/*"></label>
<div>APARATUR DESA</div>
<h1>HAMDANI HASAN</h1>
<h3>Kepala Seksi Pemerintahan</h3>
<div class="marq"><span>Berdedikasi melayani masyarakat Desa Bonto Marannu dengan integritas, profesionalisme, dan semangat kebersamaan.</span></div>
<h2 style="color:gold">Layanan Desa Digital</h2>
<a class="btn wa" href="https://wa.me/628521120567">WhatsApp: 08521120567</a>
<a class="btn web" href="https://bontomarannu.com">bontomarannu.com</a>
</div>
<div class="footer"><b>Desa Bonto Marannu 2026</b><br>Melayani Setulus Hati</div>
</div>
<script>
up.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>profile.src=x.target.result;r.readAsDataURL(f);}
</script>
</body></html>
